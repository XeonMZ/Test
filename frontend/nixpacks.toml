# Nixpacks configuration for the SJT frontend (Next.js).
# Ensures the production build runs BEFORE the server starts so the host never
# hits "Could not find a production build in the .next directory".

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
# --omit=dev is fine for a Next.js runtime; build deps for Next are prod deps.
# HUSKY=0 stops the "prepare" script from failing in CI (no git hooks needed).
cmds = ["HUSKY=0 npm ci --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
