name: Auto Unzip

on:
  push:
    paths:
      - '**/*.zip'
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          find . -name "*.zip" | while read zipfile; do
            folder="${zipfile%.zip}"
            mkdir -p "$folder"
            unzip -o "$zipfile" -d "$folder"
            rm "$zipfile"
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Auto unzip"
          git push
